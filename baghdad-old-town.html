:root{
  color-scheme:light;

html[dir="rtl"]{--f-display:'Amiri',serif;--f-body:'Tajawal',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--f-body);color:var(--ink);background:var(--white);line-height:1.75;font-size:17px}
h1,h2,h3{font-family:var(--f-display);font-weight:400;line-height:1.2;color:var(--ink)}
.eyebrow{display:inline-block;letter-spacing:.18em;text-transform:uppercase;font-size:12px;font-weight:700;color:var(--orange);margin-bottom:14px}
html[dir="rtl"] .eyebrow{letter-spacing:.04em}
.wrap{max-width:1080px;margin:0 auto;padding:0 22px}
.narrow{max-width:780px;margin:0 auto}

/* ---------- Header ---------- */
header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.nav{display:flex;align-items:center;justify-content:space-between;height:64px;gap:12px}
.logo{font-family:'Marcellus',serif;font-size:22px;color:var(--ink);text-decoration:none;white-space:nowrap}
.logo span{color:var(--orange)}
.nav .links{display:flex;align-items:center;gap:20px}
.nav a.link{color:var(--ink);text-decoration:none;font-size:15px;font-weight:600}
.nav a.link:hover{color:var(--orange)}
.nav .book-btn{background:var(--orange);color:#fff;padding:9px 18px;border-radius:999px;text-decoration:none;font-weight:700;font-size:15px;white-space:nowrap}
.nav .book-btn:hover{background:var(--orange-deep)}
.langs{display:flex;gap:4px;border:1.5px solid var(--line);border-radius:999px;padding:3px}
.langs button{border:none;background:none;font-family:var(--f-body);font-size:13px;font-weight:700;padding:5px 12px;border-radius:999px;cursor:pointer;color:var(--ink-soft)}

/* ---------- Hero ---------- */

.meta b{display:block;font-family:var(--f-display);font-size:22px;color:var(--orange-deep)}
.meta small{color:var(--ink-soft);letter-spacing:.05em;text-transform:uppercase;font-size:11px;font-weight:700}
.hero .cta-row{margin-top:34px;display:flex;gap:14px;flex-wrap:wrap}

.gallery img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:12px;display:block;background:var(--cream)}

input:focus{outline:none;border-color:var(--orange)}
.hint{font-size:13px;color:var(--ink-soft);margin-top:5px}
button[type=submit]{margin-top:26px;width:100%;background:var(--orange);color:#fff;border:none;border-radius:999px;padding:15px;font-size:17px;font-weight:700;cursor:pointer;font-family:var(--f-body)}

.msg.err{display:block;background:#fdeeee;color:#a12b2b;border:1px solid #f0c6c6}
.date-note{font-size:14px;background:var(--cream);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-top:20px}

#wa-float:hover{animation:none;background:#1fb457}

intro:{eyebrow:"Discover the soul of the city",title:"One morning. Twelve centuries.",
p1:"Baghdad was founded in 762 AD as the Round City of the Abbasid caliphs, and within a generation it had become the largest and most learned city on Earth — the home of the House of Wisdom, where the knowledge of Greece, Persia and India was translated, debated and expanded. The old quarter you will walk through today grew along the eastern bank of the Tigris, and every street in it remembers something: a caliph's college, a coppersmith's hammer, a poet's argument in a café that never closed.",
p2:"This tour is designed as a single, continuous story. We begin in the medieval world of the Abbasids, walk through the living crafts and markets that survived the centuries, step into the daily life of Ottoman-era Baghdad, and finish beneath a clock tower that has watched the city change for a hundred and fifty years. Your guide walks with you the entire way — translating, explaining, and opening doors that most visitors walk past without noticing."},

{title:"Mustansiriyah Madrasah",tags:"Established 1227 AD · Abbasid era landmark",paras:[
"We begin where Baghdad's golden age is still standing. The Mustansiriyah Madrasah was founded by the Abbasid caliph al-Mustansir Billah and completed in 1234 AD, making it one of the oldest universities in the world — older than the Sorbonne's colleges, older than most of Oxford. In its day it was something genuinely revolutionary: for the first time, all four Sunni schools of Islamic law were taught together under a single roof, alongside medicine, mathematics, pharmacy, Quranic sciences and Arabic literature. Students came from across the Islamic world, and the madrasah housed them, fed them, paid them stipends and gave them access to a library that chroniclers describe as containing tens of thousands of volumes.",
"The building itself is a masterpiece of late Abbasid brick architecture. You enter through a soaring portal into a vast rectangular courtyard, over a hundred meters long, wrapped in two storeys of pointed-arch arcades. Look closely at the brickwork: the geometric ornament — stars, interlacing bands, muqarnas niches — is not carved stone or applied tile but brick itself, laid and cut with astonishing precision. This is the signature of Baghdad's medieval builders, who turned the humble material of the Mesopotamian plain into lacework.",
"The madrasah was famous in the medieval world for one more marvel: a great water clock that stood at its entrance, described in awe by travelers such as Ibn Battuta, which marked the hours of prayer with moving figures and falling metal balls. It was a public statement that this was a house of science as much as of scripture.",
"Perhaps the most moving thing about the Mustansiriyah is simply that it survived. Barely twenty-four years after its completion, the Mongol army of Hulagu Khan sacked Baghdad in 1258, ending the Abbasid caliphate and destroying most of the city. The madrasah endured — used, abandoned, repurposed as a caravanserai and customs house through the Ottoman centuries, and finally restored. Standing in its courtyard beside the Tigris, you are standing in the last great room of the Abbasid world."],
fact:"the river façade offers one of the finest photo angles in old Baghdad — Abbasid brickwork with the Tigris flowing behind, much as a student would have seen it eight centuries ago."},
{title:"Copper Market (Souq al-Safafeer)",tags:"Traditional handcrafts · Coppersmith heritage",paras:[
"You will hear the second stop before you see it. Souq al-Safafeer — the coppersmiths' market — announces itself with a rhythm of hammer blows that has echoed through this covered lane for centuries. The craft practiced here is one of the oldest continuously practiced trades in the city, with roots that reach back to the Abbasid markets and, beyond them, to the metalworkers of ancient Mesopotamia, who were hammering copper on this same river plain five thousand years ago.",
"Walk slowly here. On either side of the narrow passage, workshops barely larger than a closet hold a single craftsman, a low anvil, a charcoal brazier and a wall of gleaming work: great serving trays engraved with calligraphy and scenes of old Baghdad, long-beaked coffee pots (the dallah that is the emblem of Arab hospitality), water ewers, cauldrons, lanterns and delicate rosewater sprinklers. Everything is shaped by hand, the way it has always been: the sheet of copper is heated, hammered over forms, planished smooth, then engraved with a fine chisel in patterns each family of smiths guards as its own.",
"The souq is also an honest place to see how heritage crafts live in a modern economy. In the mid-twentieth century, hundreds of workshops rang here; cheap imported metal thinned their ranks, and for a time the hammers nearly fell silent. Today a determined core of master smiths — several of them third- and fourth-generation — keep the craft alive, joined by younger apprentices and supported by renewed interest from Iraqi families and visitors who want a piece of Baghdad made in Baghdad.",
"Your guide will introduce you to the craftsmen personally. You are welcome to watch a piece being engraved, ask questions, and — if something catches your eye — haggle in the traditional, good-humored way. A hand-engraved tray or dallah from Safafeer is among the most authentic souvenirs Iraq offers: it carries the actual hammer marks of the city."],
fact:"mornings are the best time to see the smiths at work; by early afternoon many switch from hammering to engraving and selling."},
{title:"Al-Baghdadi Museum",tags:"Folklore heritage · Traditional dioramas",paras:[
"A few minutes' walk brings us to the riverbank and one of the most charming museums in the Middle East. The Baghdadi Museum, housed in a graceful old building on the Tigris, is devoted not to kings and conquests but to something rarer: the everyday life of ordinary Baghdadis in the late nineteenth and early twentieth centuries, recreated in dozens of lifelike, life-size dioramas.",
"Room after room, the old city comes back to life. A traditional Baghdadi wedding unfolds with the bride in her embroidered finery and the women of the neighborhood ululating around her. A kuttab — the old Quranic school — shows boys swaying over their wooden writing boards under the eye of a stern mullah. There is the coffeehouse with its storyteller holding the room spellbound; the public bath; the carpenter, the baker pulling flat loaves from a clay oven, the water-seller with his goatskin, the fortune-teller, the barber who also pulled teeth. Each scene is built with genuine period costumes, tools and furnishings, and each figure was modeled with such attention that older Baghdadis sometimes recognize the faces of trades and characters they remember from childhood.",
"What makes the museum quietly profound is its subject. The courtyard houses, the crafts, the street cries recorded and played among the scenes — much of this world vanished within a single lifetime as Baghdad modernized. The museum, established in 1970, is the city's act of remembering itself. For a visitor it is the perfect key to the rest of the tour: after seeing how the old city lived, you will read its streets, markets and cafés with completely different eyes.",
"The building's riverside terrace also offers a beautiful, calm view over the Tigris — a good moment to pause before we step out onto the grandest street of them all."],
fact:"the museum contains roughly seventy scenes and several hundred figures; let your guide point out the small details — the genuine antique radios, scales and lamps hidden inside the displays."},
{title:"Al Rasheed Street",tags:"Historic cultural boulevard · Classic architecture",paras:[
"Now we walk the spine of modern Baghdad's memory. Al Rasheed Street was cut through the dense fabric of the old city in 1916, in the final months of Ottoman rule, and for most of the twentieth century it was to Baghdad what the Champs-Élysées is to Paris: the street where everything happened. Named after the most famous of Abbasid caliphs, Harun al-Rashid, it runs parallel to the Tigris for nearly three kilometers, and walking it is like leafing through the city's twentieth-century photo album.",
"The architecture is unlike anywhere else in the Middle East. Both sides of the street are lined with continuous colonnades — hundreds of columns carrying the upper floors over the sidewalk, so that shoppers could promenade in shade through Baghdad's fierce summers. Above the columns rise façades that mix Ottoman, European neo-classical and early modern styles, with wooden balconies, ornamental plasterwork and the shuttered windows of what were once the city's finest offices, hotels and department stores.",
"Your guide will read the street's biography as you walk it. Here were the great cinemas where Baghdad fell in love with the movies. Here were the legendary cafés where poets like al-Jawahiri and al-Sayyab argued about verse and politics; here the record shops from which the voices of Umm Kulthum and the Iraqi maqam masters poured into the street. Here stands the Haydar-Khana Mosque, one of the most beautiful Ottoman mosques in Iraq, which also witnessed the meetings that sparked the 1920 revolution against British rule.",
"Al Rasheed Street today is weathered, and that is part of its power. Restoration works are gradually returning stretches of the colonnades to their old dignity, but the street does not perform for tourists; it is simply, stubbornly itself. Walking it in the company of someone who knows its stories is one of the most atmospheric experiences Baghdad offers."],
fact:"look up. The finest details of Al Rasheed Street — carved balconies, date-stamped façades, faded cinema signs — all live above eye level."},
{title:"Mutanabbi Street",tags:"Historic book markets · Historic literary cafés",paras:[
"From Al Rasheed Street we turn into the most beloved four hundred meters in the Arab world of letters. Mutanabbi Street, named after the towering tenth-century poet Abu al-Tayyib al-Mutanabbi, is Baghdad's street of books — a tradition of bookselling and public reading that reaches back, in this quarter, to the paper markets of the Abbasid city, when Baghdad's stationers' bazaar was the largest book market on Earth.",
"The street is a living answer to the old Arab saying: Cairo writes, Beirut publishes, Baghdad reads. Bookshops line both sides — some elegant and glass-fronted, some little more than a doorway stacked to the ceiling — selling everything from Ottoman-era manuscripts and vintage Iraqi newspapers to poetry chapbooks and English paperbacks. On Fridays the street closes to traffic and becomes a river of books laid out on mats, with all of literary Baghdad browsing shoulder to shoulder.",
"Halfway along stands the street's beating heart: the Shabandar Café, open since 1917. Under its ceiling fans and portraits of old Baghdad, generations of writers have argued over sweet tea and the bubbling of water pipes. The café is also a place of pilgrimage: after the street was devastated by a bombing in 2007, its owner reopened the café in memory of the sons he lost that day, and the street rebuilt itself around its books. Its revival — repaved, relit, thronged every weekend — has become the most powerful symbol of Baghdad's cultural resilience.",
"At the end of the street, where it meets the Tigris, the bronze statue of al-Mutanabbi himself rises above the river, coat billowing, arm outstretched in mid-declamation. Standing beneath him with the book market behind you and the river before you, you understand what this city has always been proudest of: not its palaces, but its words."],
fact:"ask your guide for a glass of tea at the Shabandar Café and the story of its walls — every photograph has one."},
{title:"Qishla Clock Tower",tags:"Ottoman-era landmark · Al-Qishla Square",paras:[
"Our walk ends in a garden by the river, beneath the clock that Ottoman Baghdad set ticking. The Qishla — from the Turkish word for barracks — was built in the second half of the nineteenth century as the seat of Ottoman power in Baghdad: a vast two-storey complex of government offices and soldiers' quarters, expanded by the great reformist governor Midhat Pasha, whose brief rule in the 1870s gave Baghdad its first newspaper, modern schools, a tramway and a bridge of boats across the Tigris.",
"Rising above the courtyard is the tower itself — an elegant brick shaft crowned by a four-faced clock, added so that soldiers, clerks and the whole riverside city could order their day by a single, public, mechanical time. It was among the first public clocks in the region, and its chime became one of the defining sounds of Baghdad. The tower has watched every act of the modern Iraqi story from this courtyard: the last Ottoman garrisons, the British occupation of 1917, and in 1921 the ceremony held in this very complex at which Faisal I was proclaimed the first king of Iraq.",
"Today the Qishla has been given back to the city as a riverside cultural garden, and it is the perfect final scene for this tour. Under its palms and old brick arcades, Baghdadis gather — especially on Fridays, flowing in from Mutanabbi Street next door — for open-air poetry readings, book stalls, calligraphy displays, chess games and music. Families photograph themselves beneath the clock; students debate on the lawns; the Tigris slides past beyond the balustrade exactly as it did for the caliphs.",
"Here your guide will bring the morning's story full circle: from the Abbasid lecture halls of the Mustansiriyah — visible just along the riverbank — to the Ottoman clock above you, six stops and six centuries connected by one short, unforgettable walk. We end with time for photos, questions and a rest in the gardens before your driver returns you to your hotel or home."],
fact:"if your tour falls on a Friday, the Qishla gardens are at their liveliest — an open-air festival of poetry and music that few visitors ever get to see."}

text:"West of Baghdad rises one of Iraq's most startling sights: the massive mud-brick core of the ziggurat of Dur-Kurigalzu, the royal city founded by the Kassite king Kurigalzu over three thousand years ago. Its eroded tower, still standing some fifty meters above the plain with its ancient reed-mat layers visible in the brickwork, was for centuries the first landmark travelers saw on the road to Baghdad. A short drive, and a leap of three millennia."},
{title:"Ctesiphon & Taq Kasra",tags:"Sasanian empire · World's great arch",

{title:"المدرسة المستنصرية",tags:"تأسست ١٢٢٧ م · معلم من العصر العباسي",paras:[
"نبدأ حيث ما يزال العصر الذهبي لبغداد واقفاً على قدميه. أسّس المدرسة المستنصرية الخليفة العباسي المستنصر بالله واكتمل بناؤها عام ١٢٣٤ م، لتكون واحدة من أقدم الجامعات في العالم. وكانت في زمانها ثورة حقيقية: فلأول مرة تُدرَّس المذاهب الفقهية السنية الأربعة معاً تحت سقف واحد، إلى جانب الطب والرياضيات والصيدلة وعلوم القرآن والأدب العربي. قصدها الطلبة من كل أنحاء العالم الإسلامي، فوفّرت لهم السكن والطعام والرواتب، ومكتبةً وصفها المؤرخون بأنها ضمّت عشرات الآلاف من المجلدات.",
"المبنى نفسه تحفة من عمارة الآجر العباسية المتأخرة. تدخل من بوابة شاهقة إلى صحن مستطيل واسع يزيد طوله على مئة متر، تحيط به أروقة من طابقين بعقود مدببة. تأمل الزخارف عن قرب: النجوم والأشرطة المتشابكة وحنايا المقرنصات ليست حجراً منحوتاً ولا بلاطاً مضافاً، بل هي الآجر ذاته، مرصوفاً ومقطوعاً بدقة مذهلة — وهذا هو توقيع بنّائي بغداد في العصور الوسطى الذين حوّلوا طين السهل الرافديني إلى ما يشبه المخرّمات.",
"واشتهرت المدرسة في العالم القديم بأعجوبة أخرى: ساعة مائية كبرى عند مدخلها، وصفها الرحّالة ومنهم ابن بطوطة بانبهار، كانت تعلن أوقات الصلاة بأشكال متحركة وكرات معدنية متساقطة — إعلاناً على الملأ بأن هذا بيتٌ للعلم بقدر ما هو بيت للدين. والأكثر تأثيراً في المستنصرية أنها ببساطة نجت: فبعد أقل من ربع قرن على اكتمالها اجتاح جيش هولاكو بغداد عام ١٢٥٨ وأسقط الخلافة العباسية ودمّر معظم المدينة، لكن المدرسة صمدت عبر القرون حتى رُمّمت. حين تقف في صحنها بجوار دجلة، فأنت تقف في آخر قاعة كبرى باقية من العالم العباسي."],

{title:"سوق الصفافير",tags:"حرف يدوية تقليدية · تراث النحّاسين",paras:[
"ستسمع المحطة الثانية قبل أن تراها. سوق الصفافير — سوق النحّاسين — يعلن عن نفسه بإيقاع المطارق الذي يتردد صداه في هذا الممر المسقوف منذ قرون. والحرفة التي تُمارس هنا من أقدم مهن المدينة المتواصلة بلا انقطاع، بجذور تمتد إلى أسواق بغداد العباسية، وقبلها إلى معدنيّي بلاد الرافدين القدماء الذين طرقوا النحاس على هذا السهل النهري نفسه قبل خمسة آلاف عام.",
"امشِ هنا على مهل. على جانبي الممر الضيق ورشٌ لا تكاد تتسع لحرفي واحد وسندان منخفض وموقد فحم وجدار من الأعمال اللامعة: صوانٍ كبيرة منقوشة بالخط العربي ومشاهد بغداد القديمة، ودلال القهوة طويلة المنقار — رمز الضيافة العربية — والأباريق والقدور والفوانيس ومرشّات ماء الورد الرقيقة. كل شيء يُشكَّل باليد كما كان دائماً: صفيحة النحاس تُحمى وتُطرق على القوالب وتُصقل ثم تُنقش بالإزميل الدقيق بزخارف تتوارثها كل عائلة من عوائل الصفافير وتحرص عليها.",
"والسوق أيضاً مكان صادق لترى كيف تعيش الحرف التراثية في اقتصاد اليوم: في منتصف القرن العشرين كانت مئات الورش تدوّي هنا، ثم كاد المعدن المستورد الرخيص يُسكت المطارق. أما اليوم فنواة عنيدة من كبار الأسطوات — بعضهم من الجيل الثالث والرابع — تُبقي الحرفة حية، يساندهم صاعدون جدد واهتمام متجدد من العائلات العراقية والزوار. سيعرّفك دليلك على الحرفيين شخصياً؛ يمكنك مشاهدة النقش عن قرب، وطرح الأسئلة، والمساومة بالطريقة التقليدية المرحة إن أعجبك شيء — فالصينية أو الدلة المنقوشة يدوياً من الصفافير من أصدق التذكارات التي يقدمها العراق: إنها تحمل ضربات مطارق المدينة نفسها."],
fact:"الصباح هو أفضل وقت لمشاهدة الصفافير أثناء العمل؛ فبعد الظهر ينتقل كثير منهم من الطرق إلى النقش والبيع."},
{title:"المتحف البغدادي",tags:"تراث شعبي · مجسمات تقليدية",paras:[
"دقائق من المشي تصلنا إلى ضفة النهر وإلى واحد من أكثر المتاحف سحراً في الشرق الأوسط. المتحف البغدادي، في مبنى قديم أنيق على دجلة، لا يحتفي بالملوك والفتوحات بل بما هو أندر: الحياة اليومية لأهل بغداد في أواخر القرن التاسع عشر وأوائل العشرين، وقد أعيد بعثها في عشرات المشاهد المجسّمة بالحجم الطبيعي.",
"غرفة بعد غرفة تعود المدينة القديمة إلى الحياة: عرس بغدادي تقليدي بعروسه المزيّنة ونساء المحلة يزغردن حولها؛ و«الكُتّاب» — المدرسة القرآنية القديمة — بصبيانه المتمايلين فوق ألواحهم الخشبية تحت عين الملّا الصارم؛ والمقهى وقصخونه الذي يشدّ أنفاس الحاضرين؛ والحمّام الشعبي؛ والنجار والخبّاز الذي يسحب الأرغفة من التنور، والسقّا بقربته، والبصّارة، والمزيّن الذي كان يقلع الأسنان أيضاً. كل مشهد مبني بأزياء وأدوات وأثاث أصلي من تلك الحقبة، وكل شخصية صيغت بعناية حتى إن كبار السن من البغداديين يتعرفون أحياناً على وجوه مهن وشخصيات يتذكرونها من طفولتهم.",
"وما يمنح المتحف عمقه الهادئ هو موضوعه ذاته: فبيوت الحوش والحرف ونداءات الباعة المسجّلة بين المشاهد — عالمٌ تلاشى معظمه خلال عمر إنسان واحد مع تحديث بغداد. المتحف، الذي تأسس عام ١٩٧٠، هو فعل المدينة في تذكّر نفسها. وهو للزائر المفتاح الأمثل لبقية الجولة: بعد أن ترى كيف عاشت المدينة القديمة، ستقرأ شوارعها وأسواقها ومقاهيها بعينين مختلفتين تماماً. ولا تفوّت شرفة المبنى المطلة على دجلة — لحظة هدوء جميلة قبل أن نخرج إلى أعظم شوارع المدينة."],
fact:"يضم المتحف نحو سبعين مشهداً ومئات الشخصيات؛ دع دليلك يريك التفاصيل الصغيرة — أجهزة الراديو والموازين والمصابيح الأصلية القديمة المخبأة داخل المشاهد."},
{title:"شارع الرشيد",tags:"جادة ثقافية تاريخية · عمارة كلاسيكية",paras:[
"الآن نمشي في العمود الفقري لذاكرة بغداد الحديثة. شُقّ شارع الرشيد وسط نسيج المدينة القديمة عام ١٩١٦ في الأشهر الأخيرة من الحكم العثماني، وظل طوال معظم القرن العشرين لبغداد ما هو الشانزليزيه لباريس: الشارع الذي يحدث فيه كل شيء. سُمّي على اسم أشهر خلفاء بني العباس هارون الرشيد، ويمتد بموازاة دجلة نحو ثلاثة كيلومترات، والمشي فيه أشبه بتقليب ألبوم صور المدينة في القرن العشرين.",
"عمارته لا تشبه أي مكان آخر في الشرق الأوسط: فعلى جانبيه أروقة متصلة تحملها مئات الأعمدة التي ترفع الطوابق العليا فوق الرصيف، ليتنزه المتسوقون في الظل عبر صيف بغداد القاسي. وفوق الأعمدة ترتفع واجهات تمزج الطرز العثمانية والكلاسيكية الأوروبية والحداثة المبكرة، بشرفات خشبية وزخارف جصية ونوافذ ما كان يوماً أرقى مكاتب المدينة وفنادقها ومتاجرها.",
"سيقرأ لك دليلك سيرة الشارع وأنت تمشيه: هنا كانت دور السينما الكبرى التي عشقت فيها بغداد الأفلام؛ وهنا المقاهي الأسطورية التي تجادل فيها الجواهري والسيّاب حول الشعر والسياسة؛ وهنا محلات الأسطوانات التي كانت تصبّ منها أصوات أم كلثوم وأساتذة المقام العراقي في الشارع؛ وهنا يقف جامع الحيدرخانة، من أجمل الجوامع العثمانية في العراق، الذي شهد أيضاً الاجتماعات التي أشعلت ثورة العشرين ضد الاحتلال البريطاني. شارع الرشيد اليوم أنهكه الزمن، وهذا جزء من قوته: أعمال الترميم تعيد لأجزاء من أروقته كرامتها القديمة، لكنه لا يتصنّع للسياح؛ إنه ببساطة وعناد نفسُه. والمشي فيه بصحبة من يعرف حكاياته من أكثر تجارب بغداد أسراً."],
fact:"ارفع بصرك. أجمل تفاصيل شارع الرشيد — الشرفات المنحوتة والواجهات المؤرخة ولافتات السينمات الباهتة — كلها تعيش فوق مستوى النظر."},
{title:"شارع المتنبي",tags:"أسواق كتب عريقة · مقاهٍ أدبية تاريخية",paras:[
"من شارع الرشيد ننعطف إلى أحبّ أربعمئة متر إلى قلب عالم الأدب العربي. شارع المتنبي، المسمّى على اسم الشاعر العملاق أبي الطيب المتنبي، هو شارع الكتب في بغداد — تقليدٌ في بيع الكتب والقراءة العامة تمتد جذوره في هذا الحي إلى أسواق الورّاقين في المدينة العباسية، حين كان سوق ورّاقي بغداد أكبر سوق للكتب على وجه الأرض.",
"الشارع جوابٌ حيّ على المقولة العربية الشهيرة: القاهرة تكتب وبيروت تطبع وبغداد تقرأ. تصطف المكتبات على الجانبين — بعضها أنيق بواجهات زجاجية وبعضها لا يعدو مدخلاً مكدساً حتى السقف — تبيع كل شيء من المخطوطات العثمانية والصحف العراقية القديمة إلى دواوين الشعر والروايات الأجنبية. وفي أيام الجمعة يُغلق الشارع أمام السيارات ليتحول إلى نهر من الكتب المفروشة على البسط، وكل بغداد الأدبية تتصفحها كتفاً إلى كتف.",
"في منتصف الشارع ينبض قلبه: مقهى الشابندر، المفتوح منذ عام ١٩١٧. تحت مراوحه وصور بغداد القديمة على جدرانه تجادلت أجيال من الكتّاب على الشاي وقرقرة النراجيل. والمقهى أيضاً مقام وفاء: فبعد أن دمّر تفجير عام ٢٠٠٧ الشارع، أعاد صاحبه فتحه إحياءً لذكرى أبنائه الذين فقدهم ذلك اليوم، ونهض الشارع من جديد حول كتبه، ليصبح انبعاثه — مرصوفاً مضاءً مزدحماً كل نهاية أسبوع — أقوى رموز صمود بغداد الثقافي. وفي نهاية الشارع حيث يلتقي دجلة، ينتصب تمثال المتنبي البرونزي فوق النهر، بعباءته المنفوخة وذراعه الممدودة في منتصف الإلقاء. حين تقف تحته وسوق الكتب خلفك والنهر أمامك، تفهم ما ظلّت هذه المدينة الأكثر فخراً به: ليس قصورها، بل كلماتها."],
fact:"اطلب من دليلك استكان شاي في مقهى الشابندر وحكاية جدرانه — فلكل صورة معلقة قصة."},
{title:"ساعة القشلة",tags:"معلم من العهد العثماني · ساحة القشلة",paras:[
"تنتهي جولتنا في حديقة على النهر، تحت الساعة التي أطلقت بغداد العثمانية دقّاتها. القشلة — من الكلمة التركية التي تعني الثكنة — بُنيت في النصف الثاني من القرن التاسع عشر مقراً للسلطة العثمانية في بغداد: مجمّع ضخم من طابقين للدوائر الحكومية ومساكن الجند، وسّعه الوالي المصلح الكبير مدحت باشا الذي منح بغداد في ولايته القصيرة في سبعينيات ذلك القرن أول صحيفة ومدارس حديثة وخط ترامواي وجسراً من الزوارق على دجلة.",
"وفوق الباحة يرتفع البرج نفسه — عمود آجري رشيق يتوّجه ميناء ساعة بأربعة أوجه، أضيف ليضبط الجنود والموظفون والمدينة النهرية كلها يومهم على توقيت عام واحد. كانت من أوائل الساعات العامة في المنطقة، وصار رنينها من أصوات بغداد المميزة. ومن هذه الباحة شهد البرج كل فصول القصة العراقية الحديثة: آخر الحاميات العثمانية، والاحتلال البريطاني عام ١٩١٧، ثم الحفل الذي أقيم في هذا المجمّع بالذات عام ١٩٢١ ونودي فيه بفيصل الأول أول ملك على العراق.",
"اليوم أعيدت القشلة إلى المدينة حديقةً ثقافية على النهر، وهي المشهد الختامي الأمثل لهذه الجولة. تحت نخيلها وأروقتها الآجرية يجتمع البغداديون — خصوصاً أيام الجمعة، متدفقين من شارع المتنبي المجاور — لأمسيات الشعر في الهواء الطلق وبسطات الكتب وعروض الخط والشطرنج والموسيقى. هنا يكمل دليلك دائرة حكاية الصباح: من قاعات المستنصرية العباسية المطلة على الضفة ذاتها إلى الساعة العثمانية فوق رأسك — ست محطات وستة قرون يربطها مشوار واحد قصير لا يُنسى. ونختم بوقت للصور والأسئلة والاستراحة في الحدائق قبل أن يعيدك سائقنا إلى فندقك أو منزلك."],
fact:"إذا صادفت جولتك يوم جمعة فستجد حدائق القشلة في أبهى حالاتها — مهرجان مفتوح للشعر والموسيقى قلّما يحظى الزوار برؤيته."}
],

{title:"زقورة دور كوريكالزو (عقرقوف)",tags:"العصر الكشّي · نحو القرن ١٤ ق.م",
text:"غرب بغداد يرتفع أحد أكثر مشاهد العراق إدهاشاً: النواة الطينية الهائلة لزقورة دور كوريكالزو، المدينة الملكية التي أسسها الملك الكشّي كوريكالزو قبل أكثر من ثلاثة آلاف عام. برجها المتآكل، الذي ما يزال شامخاً نحو خمسين متراً فوق السهل وتظهر في آجرّه طبقات الحصر القديمة، ظل لقرون أول معلم يراه المسافرون على طريق بغداد. مشوار قصير بالسيارة.. وقفزة عبر ثلاثة آلاف عام."},
{title:"طيسفون وطاق كسرى",tags:"الإمبراطورية الساسانية · قوس العالم الأعظم",
text:"جنوب شرق المدينة، في سلمان باك على دجلة، يقف طاق كسرى — قاعة العرش الهائلة لملوك فارس الساسانيين وأكبر عقد آجري من فضاء واحد بُني في التاريخ. يحلّق القوس نحو سبعة وثلاثين متراً، وتحته عقد شاهات فارس مجالسهم حتى الفتح الإسلامي. أن تقف تحت هذا العقد الذي مضى عليه سبعة عشر قرناً، وحولك أطلال طيسفون القديمة، تجربة معمارية من أعظم ما تقدمه الأرض."},
{title:"الغروب عند مرقد الكاظمية",tags:"القباب الذهبية · مدينة زيارة نابضة",
text:"اختم يومك في الكاظمية، من أقدس مواقع المسلمين الشيعة، حيث يرفع مرقد الإمام موسى الكاظم والإمام محمد الجواد قبّتيه الذهبيتين ومآذنه الأربع المذهّبة فوق حيّ زيارةٍ يعجّ بالحياة. عند الغروب تشتعل القباب بالضوء وتتوهج الأسواق، وأجواء الإيمان والحياة حول المرقد لا تُنسى. سيشرح لك دليلك آداب الزيارة واللباس لتعيش التجربة باحترام وراحة."}]},

p1:"Багдад был основан в 762 году как Круглый город аббасидских халифов и уже через поколение стал крупнейшим и самым просвещённым городом на Земле — домом Дома мудрости, где переводили, обсуждали и развивали знания Греции, Персии и Индии. Старый квартал, по которому вы пройдёте сегодня, вырос на восточном берегу Тигра, и каждая его улица что-то помнит: медресе халифа, молот медника, спор поэта в кофейне, которая никогда не закрывалась.",
p2:"Экскурсия построена как единый, непрерывный рассказ. Мы начнём в средневековом мире Аббасидов, пройдём через живые ремёсла и базары, пережившие века, заглянем в повседневную жизнь османского Багдада и закончим под часовой башней, которая полтора столетия наблюдает, как меняется город. Гид идёт с вами весь путь — переводит, объясняет и открывает двери, мимо которых большинство гостей проходит, не замечая."},
itin:{eyebrow:"Маршрут экскурсии",title:"Шесть остановок — одна история",
sub:"Маршрут повторяет естественную пешеходную линию старого города: от медресе на берегу реки до садов Кишлы. Расстояния между остановками короткие, а история между ними — огромная."},

stops:[
{title:"Медресе Мустансирия",tags:"Основано в 1227 г. · Памятник эпохи Аббасидов",paras:[
"Мы начинаем там, где золотой век Багдада всё ещё стоит на ногах. Медресе Мустансирия основал аббасидский халиф аль-Мустансир, и завершено оно было в 1234 году — это один из старейших университетов мира. Для своего времени оно было настоящей революцией: впервые все четыре суннитские школы исламского права преподавались под одной крышей, наряду с медициной, математикой, фармацевтикой, кораническими науками и арабской словесностью. Сюда съезжались студенты со всего исламского мира: медресе давало им жильё, питание, стипендии и доступ к библиотеке, в которой, по словам хронистов, хранились десятки тысяч томов.",
"Само здание — шедевр позднеаббасидской кирпичной архитектуры. Через высокий портал вы входите в огромный прямоугольный двор длиной более ста метров, окружённый двумя ярусами стрельчатых аркад. Присмотритесь к кладке: геометрический орнамент — звёзды, переплетающиеся ленты, ниши-мукарны — это не резной камень и не облицовка, а сам кирпич, уложенный и вытесанный с поразительной точностью. Такова подпись средневековых багдадских зодчих, превративших скромную глину месопотамской равнины в кружево.",
"В средневековом мире медресе славилось ещё одним чудом — большими водяными часами у входа, которыми восхищались путешественники, включая Ибн Баттуту: они отмечали часы молитв движущимися фигурами и падающими металлическими шарами. Это было публичное заявление: здесь дом науки в той же мере, что и дом веры.",
"Но, пожалуй, самое трогательное в Мустансирии — то, что она уцелела. Всего через двадцать четыре года после завершения строительства монгольская армия Хулагу разорила Багдад в 1258 году, положив конец Аббасидскому халифату и разрушив большую часть города. Медресе выстояло — использовалось, забрасывалось, служило караван-сараем и таможней в османские века и наконец было отреставрировано. Стоя в его дворе у Тигра, вы стоите в последнем великом зале аббасидского мира."],
fact:"фасад со стороны реки — один из лучших ракурсов для фото в старом Багдаде: аббасидский кирпич и текущий за ним Тигр, почти такие же, какими их видел студент восемь веков назад."},
{title:"Медный базар (Сук ас-Сафафир)",tags:"Традиционные ремёсла · Наследие медников",paras:[
"Вторую остановку вы услышите раньше, чем увидите. Сук ас-Сафафир — базар медников — объявляет о себе ритмом молотков, который веками отдаётся эхом в этом крытом переулке. Ремесло, которым здесь занимаются, — одно из старейших непрерывных ремёсел города: его корни уходят к аббасидским базарам, а через них — к металлургам древней Месопотамии, ковавшим медь на этой же речной равнине пять тысяч лет назад.",
"Идите здесь медленно. По обе стороны узкого прохода — мастерские размером со шкаф: один мастер, низкая наковальня, жаровня с углями и стена сияющих изделий. Огромные подносы с гравировкой — каллиграфией и сценами старого Багдада, кофейники с длинным носиком (далла — символ арабского гостеприимства), кувшины, котлы, фонари и изящные сосуды для розовой воды. Всё делается вручную, как и всегда: лист меди нагревают, выколачивают по формам, выглаживают и гравируют тонким резцом узорами, которые каждая семья медников хранит как собственные.",
"Базар честно показывает, как живут традиционные ремёсла в современной экономике. В середине двадцатого века здесь звенели сотни мастерских; дешёвый привозной металл проредил их ряды, и молотки едва не смолкли. Сегодня упорное ядро мастеров — среди них медники в третьем и четвёртом поколении — хранит ремесло, а рядом растут ученики и возвращается интерес иракских семей и путешественников, которым нужен кусочек Багдада, сделанный в Багдаде.",
"Гид познакомит вас с мастерами лично. Можно смотреть, как гравируется изделие, задавать вопросы и — если что-то приглянулось — торговаться по-старинному, весело и доброжелательно. Поднос или далла ручной работы из Сафафира — один из самых подлинных сувениров Ирака: он несёт настоящие удары молотков этого города."],
fact:"лучшее время застать медников за работой — утро; после полудня многие переходят от ковки к гравировке и продаже."},
{title:"Музей аль-Багдади",tags:"Народное наследие · Традиционные диорамы",paras:[
"Несколько минут пешком — и мы у берега реки, в одном из самых обаятельных музеев Ближнего Востока. Музей аль-Багдади, разместившийся в изящном старом здании на Тигре, посвящён не царям и завоеваниям, а куда более редкой теме: повседневной жизни простых багдадцев конца XIX — начала XX века, воссозданной в десятках реалистичных диорам в натуральную величину.",
"Зал за залом старый город оживает. Традиционная багдадская свадьба — невеста в расшитом наряде, женщины квартала вокруг неё; куттаб — старая коранная школа — мальчики, раскачивающиеся над деревянными дощечками под взглядом строгого муллы; кофейня, где сказитель держит зал в оцепенении; общественная баня; плотник, пекарь, достающий лепёшки из глиняной печи, водонос с бурдюком, гадалка, цирюльник, который заодно рвал зубы. Каждая сцена собрана из подлинных костюмов, инструментов и утвари той эпохи, а фигуры вылеплены с таким вниманием, что пожилые багдадцы порой узнают в них лица ремёсел и персонажей своего детства.",
"Тихая глубина музея — в самой его теме. Дома с внутренними дворами, ремёсла, записанные крики уличных торговцев, звучащие между сценами, — большая часть этого мира исчезла за одну человеческую жизнь, когда Багдад стал современным городом. Музей, основанный в 1970 году, — это акт памяти города о самом себе. Для гостя он — идеальный ключ к остальной прогулке: увидев, как жил старый город, вы будете читать его улицы, базары и кофейни совершенно другими глазами.",
"С террасы музея открывается красивый, спокойный вид на Тигр — хорошая пауза перед выходом на самую парадную улицу города."],
fact:"в музее около семидесяти сцен и несколько сотен фигур; попросите гида показать мелкие детали — настоящие старинные радиоприёмники, весы и лампы, спрятанные внутри экспозиций."},
{title:"Улица ар-Рашид",tags:"Исторический бульвар · Классическая архитектура",paras:[
"Теперь мы идём по хребту памяти современного Багдада. Улицу ар-Рашид проложили сквозь плотную ткань старого города в 1916 году, в последние месяцы османского правления, и большую часть двадцатого века она была для Багдада тем же, чем Елисейские Поля для Парижа: улицей, где происходило всё. Названная в честь самого знаменитого аббасидского халифа Харуна ар-Рашида, она тянется вдоль Тигра почти на три километра, и прогулка по ней — как перелистывание фотоальбома города за целый век.",
"Такой архитектуры нет больше нигде на Ближнем Востоке. Обе стороны улицы обрамлены сплошными колоннадами — сотни колонн несут верхние этажи над тротуаром, чтобы прохожие могли гулять в тени сквозь свирепое багдадское лето. Над колоннами — фасады, смешивающие османский стиль, европейскую неоклассику и ранний модернизм: деревянные балконы, лепнина и ставни окон бывших лучших контор, гостиниц и магазинов города.",
"Гид будет читать вам биографию улицы на ходу. Здесь были великие кинотеатры, в которых Багдад влюбился в кино; легендарные кофейни, где поэты аль-Джавахири и ас-Сайяб спорили о стихах и политике; лавки грампластинок, из которых на улицу лились голоса Умм Кульсум и мастеров иракского макама. Здесь стоит мечеть Хайдар-хана — одна из красивейших османских мечетей Ирака, свидетельница собраний, из которых выросло восстание 1920 года против британского правления.",
"Сегодня улица ар-Рашид потрёпана временем, и в этом часть её силы. Реставрация постепенно возвращает колоннадам былое достоинство, но улица не играет для туристов — она просто, упрямо остаётся собой. Пройти её рядом с человеком, знающим её истории, — один из самых атмосферных опытов Багдада."],
fact:"смотрите вверх: лучшие детали улицы ар-Рашид — резные балконы, датированные фасады, выцветшие вывески кинотеатров — живут выше уровня глаз."},
{title:"Улица аль-Мутанабби",tags:"Старинные книжные ряды · Литературные кофейни",paras:[
"С улицы ар-Рашид мы сворачиваем на самые любимые четыреста метров арабского мира словесности. Улица аль-Мутанабби, названная в честь великого поэта X века Абу ат-Тайиба аль-Мутанабби, — книжная улица Багдада. Традиция книжной торговли и публичного чтения восходит здесь к бумажным рынкам аббасидской столицы, когда багдадский базар переписчиков был крупнейшим книжным рынком на Земле.",
"Улица — живой ответ на старую арабскую поговорку: Каир пишет, Бейрут печатает, Багдад читает. Книжные лавки тянутся по обеим сторонам — одни элегантные, с витринами, другие — просто дверной проём, заставленный до потолка: османские рукописи, старые иракские газеты, поэтические сборники, романы на разных языках. По пятницам улицу закрывают для машин, и она превращается в реку книг, разложенных на циновках, а весь литературный Багдад листает их плечом к плечу.",
"Посередине улицы бьётся её сердце — кофейня «Шабандар», открытая в 1917 году. Под её потолочными вентиляторами и портретами старого Багдада поколения писателей спорили за сладким чаем под бульканье кальянов. Это ещё и место памяти: после того как в 2007 году улицу разрушил взрыв, хозяин вновь открыл кофейню в память о сыновьях, которых потерял в тот день, — и улица заново отстроила себя вокруг своих книг. Её возрождение — вымощенная, освещённая, многолюдная каждые выходные — стало самым сильным символом культурной стойкости Багдада.",
"В конце улицы, у самого Тигра, над рекой возвышается бронзовая статуя аль-Мутанабби: плащ развевается, рука простёрта на середине строки. Стоя под ним — книжные ряды за спиной, река перед глазами, — понимаешь, чем этот город всегда гордился больше всего: не дворцами, а словами."],
fact:"попросите гида о стакане чая в кофейне «Шабандар» и об истории её стен — у каждой фотографии там своя судьба."},
{title:"Часовая башня Кишла",tags:"Османский памятник · Площадь аль-Кишла",paras:[
"Наша прогулка заканчивается в саду у реки, под часами, которые завёл османский Багдад. Кишла — от турецкого слова «казарма» — была построена во второй половине XIX века как резиденция османской власти в Багдаде: огромный двухэтажный комплекс правительственных контор и солдатских казарм, расширенный великим губернатором-реформатором Мидхат-пашой, чьё короткое правление в 1870-х подарило Багдаду первую газету, современные школы, конку и понтонный мост через Тигр.",
"Над двором поднимается сама башня — изящный кирпичный ствол, увенчанный часами с четырьмя циферблатами: их установили, чтобы солдаты, чиновники и весь прибрежный город сверяли день по единому, публичному, механическому времени. Это были одни из первых общественных часов в регионе, и их бой стал одним из голосов Багдада. Из этого двора башня видела все акты современной иракской истории: последние османские гарнизоны, британскую оккупацию 1917 года и церемонию 1921 года, состоявшуюся именно в этом комплексе, на которой Фейсал I был провозглашён первым королём Ирака.",
"Сегодня Кишла возвращена городу как прибрежный культурный сад — идеальная финальная сцена нашей экскурсии. Под её пальмами и старыми кирпичными аркадами собираются багдадцы — особенно по пятницам, перетекая сюда с соседней улицы аль-Мутанабби — на поэтические чтения под открытым небом, книжные развалы, показы каллиграфии, шахматы и музыку. Семьи фотографируются под часами, студенты спорят на лужайках, а Тигр скользит за балюстрадой точно так же, как при халифах.",
"Здесь гид замкнёт круг утренней истории: от аббасидских аудиторий Мустансирии, видной тут же на набережной, до османских часов над вашей головой — шесть остановок и шесть веков, связанных одной короткой, незабываемой прогулкой. В финале — время для фотографий, вопросов и отдыха в саду, после чего водитель отвезёт вас обратно в отель или домой."],
fact:"если ваша экскурсия выпадает на пятницу, сады Кишлы предстанут в самом живом виде — фестиваль поэзии и музыки под открытым небом, который видят немногие путешественники."}
],

sub:"Продлите день одной из трёх выдающихся поездок за пределы центра. Спросите о любой из них при бронировании — мы подстроим время и транспорт под вашу пешеходную экскурсию.",

{title:"Зиккурат Дур-Куригальзу",tags:"Касситская эпоха · ок. XIV века до н.э.",
text:"К западу от Багдада поднимается одно из самых поразительных зрелищ Ирака — массивное сырцовое ядро зиккурата Дур-Куригальзу, царского города, основанного касситским царём Куригальзу более трёх тысяч лет назад. Его выветренная башня, всё ещё возвышающаяся метров на пятьдесят над равниной, с древними слоями тростниковых циновок в кладке, веками была первым ориентиром путников на дороге в Багдад. Короткая поездка — и прыжок через три тысячелетия."},
{title:"Ктесифон и Так-Кисра",tags:"Империя Сасанидов · Великая арка мира",
text:"К юго-востоку от города, в Салман-Паке на Тигре, стоит Так-Кисра — колоссальный тронный зал персидских царей Сасанидов и самый большой однопролётный кирпичный свод, когда-либо построенный. Арка взмывает примерно на тридцать семь метров; под ней шахи Персии держали двор вплоть до исламского завоевания. Стоять под этим сводом возрастом в семнадцать веков, среди руин древнего Ктесифона, — одно из величайших архитектурных переживаний на Земле."},
{title:"Закат у святыни Казимии",tags:"Золотые купола · Живой город паломников",
text:"Завершите день в Казимии — одном из самых почитаемых мест шиитского ислама, где мавзолей имамов Мусы аль-Казима и Мухаммада аль-Джавада поднимает два золотых купола и четыре позолоченных минарета над оживлённым паломническим кварталом. На закате купола вспыхивают светом, базары сияют, а атмосфера веры и жизни вокруг святыни незабываема. Гид расскажет о правилах поведения и одежде, чтобы вы прожили этот опыт уважительно и комфортно."}]},

/* =========================================================
   I18N ENGINE
   ========================================================= */
let LANG = 'en';
try{ const s = localStorage.getItem('ft_lang'); if(s && I18N[s]) LANG = s; }catch(e){}

function t(path){
  return path.split('.').reduce((o,k)=> (o||{})[k], I18N[LANG]) ?? '';
}

function renderStops(){
  const c = document.getElementById('stops-container');
  c.innerHTML = '';
  const L = I18N[LANG];
  L.stops.forEach((s,i)=>{
    const art = document.createElement('article');
    art.className = 'stop';
    const paras = s.paras.map(p=>{
      const el = document.createElement('p'); el.textContent = p; return el.outerHTML;
    }).join('');
    art.innerHTML = `<div class="marker">${i+1}</div><h3></h3><div class="tags"></div>${paras}<div class="fact"><b></b> <span></span></div>`;
    art.querySelector('h3').textContent = s.title;
    art.querySelector('.tags').textContent = s.tags;
    art.querySelector('.fact b').textContent = L.factLabel;
    art.querySelector('.fact span').textContent = s.fact;
    c.appendChild(art);
  });
}

function renderAddons(){
  const c = document.getElementById('addons-container');
  c.innerHTML = '';
  I18N[LANG].add.items.forEach(a=>{
    const div = document.createElement('div');
    div.className = 'addon';
    div.innerHTML = `<h3></h3><div class="tags"></div><p></p>`;
    div.querySelector('h3').textContent = a.title;
    div.querySelector('.tags').textContent = a.tags;
    div.querySelector('p').textContent = a.text;
    c.appendChild(div);
  });
}

function updateWa(){
  const wa = document.getElementById('wa-float');
  const w = WA_TEXT[LANG] || WA_TEXT.en;
  wa.href = "https://wa.me/" + WHATSAPP_NUMBER + "?text=" + encodeURIComponent(w.msg);
  document.getElementById('wa-float-label').textContent = w.label;
}

function applyLang(lang){
  LANG = lang;
  try{ localStorage.setItem('ft_lang', lang); }catch(e){}
  const L = I18N[lang];
  document.documentElement.lang = L.lang;
  document.documentElement.dir = L.dir;
  document.querySelectorAll('[data-t]').forEach(el=>{ el.textContent = t(el.getAttribute('data-t')); });
  document.querySelectorAll('.langs button').forEach(b=>{ b.classList.toggle('on', b.dataset.lang === lang); });
  renderStops();
  renderAddons();
  updateWa();
  document.getElementById('submit-btn').textContent = L.form.submit;
  document.getElementById('f-name').placeholder = L.form.name;
  const hint = document.getElementById('date-hint');
  hint.textContent = datesLoaded ? L.form.hint : (datesFailed ? L.form.hintOffline : L.form.hintLoad);
  const msg = document.getElementById('form-msg');
  if(msg.dataset.key){ msg.textContent = L.msgs[msg.dataset.key]; }
}

document.querySelectorAll('.langs button').forEach(b=>{
  b.addEventListener('click', ()=> applyLang(b.dataset.lang));
});

/* =========================================================
   SUPABASE — booked dates (bookings only; storage no longer used)
   ========================================================= */
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
let bookedDates = new Set();
let datesLoaded = false, datesFailed = false;

async function loadBookedDates(){
  try{
    const { data, error } = await sb.rpc('get_oldtown_booked_dates');
    if(error) throw error;
    bookedDates = new Set((data || []).map(d => typeof d === 'string' ? d : d.get_oldtown_booked_dates));
    datesLoaded = true;
    document.getElementById('date-hint').textContent = I18N[LANG].form.hint;
  }catch(e){
    console.error(e);
    datesFailed = true;
    document.getElementById('date-hint').textContent = I18N[LANG].form.hintOffline;
  }
}

const dateInput = document.getElementById('f-date');
const minD = new Date(); minD.setDate(minD.getDate() + 1);
dateInput.min = minD.toISOString().split('T')[0];

function setMsg(key, ok){
  const msg = document.getElementById('form-msg');
  msg.dataset.key = key;
  msg.className = 'msg ' + (ok ? 'ok' : 'err');
  msg.textContent = I18N[LANG].msgs[key];
}
function clearMsg(){
  const msg = document.getElementById('form-msg');
  msg.className = 'msg'; msg.textContent=''; delete msg.dataset.key;
}

dateInput.addEventListener('change', ()=>{
  clearMsg();
  if(bookedDates.has(dateInput.value)){
    setMsg('taken', false);
    dateInput.value = "";
  }
});

/* =========================================================
   GALLERY — static images served from GitHub Pages (images/)
   لا يستهلك أي باندويث من Supabase
   ========================================================= */
function loadGallery(){
  const grid = document.getElementById('gallery-grid');
  const empty = document.getElementById('gallery-empty');
  if(!GALLERY_IMAGES.length){ empty.style.display = 'block'; return; }
  GALLERY_IMAGES.forEach(g=>{
    const img = document.createElement('img');
    img.src = g.src;
    img.alt = g.alt;
    img.loading = "lazy";
    img.decoding = "async";
    grid.appendChild(img);
  });
}

/* =========================================================
   BOOKING SUBMIT
   ========================================================= */
document.getElementById('booking-form').addEventListener('submit', async (ev)=>{
  ev.preventDefault();
  const btn = document.getElementById('submit-btn');
  clearMsg();
  const name  = document.getElementById('f-name').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const wa    = document.getElementById('f-wa').value.trim();
  const date  = dateInput.value;

  if(bookedDates.has(date)){ setMsg('taken', false); return; }

  btn.disabled = true; btn.textContent = I18N[LANG].form.sending;

  try{
    const { error } = await sb.from('oldtown_bookings').insert({ tour_date: date, name, email, whatsapp: wa });
    if(error){
      if(error.code === '23505'){ bookedDates.add(date); setMsg('race', false); return; }
      console.error(error); setMsg('fail', false); return;
    }
    await fetch("https://api.web3forms.com/submit", {
      method:"POST",
      headers:{ "Content-Type":"application/json", "Accept":"application/json" },
      body: JSON.stringify({
        access_key: WEB3FORMS_KEY,
        subject: "New booking — Baghdad Old Town Tour (" + date + ")",
        from_name: "Fable Tour Website",
        name, email, whatsapp: wa, tour_date: date, language: LANG
      })
    });
    bookedDates.add(date);
    setMsg('ok', true);
    ev.target.reset();
  }catch(e){
    console.error(e); setMsg('fail', false);
  }finally{
    btn.disabled = false; btn.textContent = I18N[LANG].form.submit;
  }
});

/* ---------- init ---------- */
applyLang(LANG);
loadBookedDates();
loadGallery();
setTimeout(()=>{ document.getElementById('wa-float').classList.add('show'); }, WA_DELAY_MS);
</script>
